name: PR Proxy Preview

on:
  workflow_dispatch:
    inputs:
      proxy_name:
        description: "Name of the proxy to preview"
        required: true
      commit_hash:
        description: "Optional: commit hash to reference a specific build"
        required: false
      pr_number:
        description: "PR number to post the preview message"
        required: true

jobs:
  preview-proxy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Validate proxy exists
      - name: Check proxy folder
        run: |
          PROXY="${{ github.event.inputs.proxy_name }}"
          PROXY_PATH="src/main/apiproxies/$PROXY"
          if [ ! -d "$PROXY_PATH" ]; then
            echo "❌ Proxy $PROXY does not exist in $PROXY_PATH!"
            exit 1
          fi
          echo "✅ Proxy $PROXY found in $PROXY_PATH."
          echo "Listing files included:"
          ls -1 "$PROXY_PATH"

      # 3. Collect commit info (optional)
      - name: Collect commit info
        run: |
          if [ ! -z "${{ github.event.inputs.commit_hash }}" ]; then
            echo "Commit hash provided: ${{ github.event.inputs.commit_hash }}"
            git fetch --all
            git show --stat ${{ github.event.inputs.commit_hash }}
          fi

      # 4. Post PR comment with preview
      - name: Comment PR with proxy preview
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = parseInt("${{ github.event.inputs.pr_number }}");
            const proxy = "${{ github.event.inputs.proxy_name }}";
            const commit = "${{ github.event.inputs.commit_hash }}";

            const { execSync } = require('child_process');
            const files = execSync(`ls -1 src/main/apiproxies/${proxy}`).toString().trim().split("\n");

            let message = `🔍 **Preview of proxy to be deployed**\n\n- Proxy: ${proxy}\n`;
            if (commit) message += `- Commit hash: ${commit}\n`;
            message += "\n**Files included:**\n";
            files.forEach(f => message += `- ${f}\n`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: message
            });
