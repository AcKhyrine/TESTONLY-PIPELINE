# ano ba yan khyyyy

name: "Surgical Proxy Promotion"

on:
  workflow_dispatch:
    inputs:
      proxy_name:
        description: 'Name of the proxy to promote'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UAT (The Base)
        uses: actions/checkout@v4
        with:
          ref: release/uat
          fetch-depth: 0

      - name: Create Promotion Branch
        run: |
          BRANCH_NAME="promote/${{ github.event.inputs.proxy_name }}-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Fetch and Copy from SIT
        run: |
          git fetch origin release/sit
          # Surgically pull only the specific proxy folder
          git checkout origin/release/sit -- src/main/apiproxies/${{ github.event.inputs.proxy_name }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Promoting ${{ github.event.inputs.proxy_name }} from SIT to UAT"
          git push origin ${{ env.BRANCH_NAME }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Promote: ${{ github.event.inputs.proxy_name }}" \
            --body "Automated promotion of ${{ github.event.inputs.proxy_name }} from release/sit to release/uat." \
            --base release/uat \
            --head ${{ env.BRANCH_NAME }}
