name: Promote Commit

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Where to promote? (release/uat or rmain)'
        required: true
        default: 'release/uat'
      commit_hash:
        description: 'Commit hash to promote'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all branches for cherry-pick

      - name: Set Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare Promotion Branch
        id: prep
        run: |
          # Use input values directly
          TARGET="${{ github.event.inputs.target_branch }}"
          COMMIT="${{ github.event.inputs.commit_hash }}"
          PROMOTE="promote-${COMMIT:0:7}"
          
          # Create and push the branch via shell
          git checkout -b "$PROMOTE" "origin/$TARGET"
          git cherry-pick "$COMMIT"
          git push origin "$PROMOTE"
          
          # Save for the next step
          echo "promote_branch=$PROMOTE" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.inputs.target_branch }}
          branch: ${{ steps.prep.outputs.promote_branch }}
          title: "Promote commit ${{ github.event.inputs.commit_hash }} to ${{ github.event.inputs.target_branch }}"
          body: "Automated promotion of commit ${{ github.event.inputs.commit_hash }} to ${{ github.event.inputs.target_branch }}"
