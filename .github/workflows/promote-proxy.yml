name: "Proxy Promotion"

on:
  workflow_dispatch:
    inputs:
      proxy_name:
        description: 'Name(s) of the proxy to promote (comma-separated) or ALL'
        required: true
        type: string
      source_branch:
        description: 'Branch to pull code FROM'
        required: true
        default: 'release/sit'
        type: choice
        options:
          - release/sit
          - release/uat
      target_branch:
        description: 'Branch to merge code INTO'
        required: true
        default: 'release/uat'
        type: choice
        options:
          - release/uat
          - main

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Handle Promotion Logic
        run: |
          # Setup variables
          INPUT="${{ github.event.inputs.proxy_name }}"
          SOURCE="${{ github.event.inputs.source_branch }}"
          TARGET="${{ github.event.inputs.target_branch }}"
          INPUT=$(echo "$INPUT" | xargs)
          UPPER_INPUT=$(echo "$INPUT" | tr '[:lower:]' '[:upper:]')

          echo "DEBUG: Input: $INPUT"
          echo "DEBUG: Source: $SOURCE"
          echo "DEBUG: Target: $TARGET"

          # Configure git
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [[ "$UPPER_INPUT" == "ALL" ]]; then
              echo "Full promotion: copying all from source branch"

              # Create a new branch based on the source branch
              PROMO_BRANCH="promote/full-${{ github.run_number }}"
              git fetch origin "$SOURCE"
              git checkout -b "$PROMO_BRANCH" "origin/$SOURCE"

              # Create promotion-list.js with ALL proxies
              PROMOTION_FILE="promotion-list.js"
              echo "module.exports = {" > $PROMOTION_FILE
              echo "  source: \"${SOURCE#release/}\"," >> $PROMOTION_FILE
              echo "  target: \"${TARGET#release/}\"," >> $PROMOTION_FILE
              echo "  proxies: [\"ALL\"]" >> $PROMOTION_FILE
              echo "};" >> $PROMOTION_FILE

              git add $PROMOTION_FILE
              git commit -m "Full promotion: add promotion-list.js"

              git push origin "$PROMO_BRANCH"

              gh pr create \
                --title "Full Promotion: $SOURCE -> $TARGET" \
                --body "Automated full promotion from \`$SOURCE\` to \`$TARGET\` including promotion-list.js" \
                --base "$TARGET" \
                --head "$PROMO_BRANCH"

          else
              echo "promotion for: $INPUT"

              # Checkout target branch as base
              git checkout "$TARGET"
              PROMO_BRANCH="promote/-${{ github.run_number }}"
              git checkout -b "$PROMO_BRANCH"
              git fetch origin "$SOURCE"

              # Pull only selected proxies
              IFS=',' read -r -a PROXIES <<< "$INPUT"
              for PROXY in "${PROXIES[@]}"; do
                  echo "Cherry-picking $PROXY from $SOURCE"
                  git checkout "origin/$SOURCE" -- "src/main/apiproxies/$PROXY" || echo "Warning: $PROXY not found in $SOURCE"
              done

              # Create promotion-list.js for promotion
              PROMOTION_FILE="promotion-list.js"
              echo "module.exports = {" > $PROMOTION_FILE
              echo "  source: \"${SOURCE#release/}\"," >> $PROMOTION_FILE
              echo "  target: \"${TARGET#release/}\"," >> $PROMOTION_FILE
              PROXIES_JS="["
              for PROXY in "${PROXIES[@]}"; do
                  PROXIES_JS+="\"$PROXY\", "
              done
              PROXIES_JS="${PROXIES_JS%, }]"
              echo "  proxies: $PROXIES_JS" >> $PROMOTION_FILE
              echo "};" >> $PROMOTION_FILE

              git add $PROMOTION_FILE

              if git diff --cached --quiet; then
                  echo "No changes detected. Skipping commit."
              else
                  git commit -m "Promotion: $INPUT from $SOURCE"
                  git push origin "$PROMO_BRANCH"
              fi

              gh pr create \
                --title "Promote: $INPUT ($SOURCE -> $TARGET)" \
                --body "Automated promotion of specific proxies: **$INPUT** from \`$SOURCE\`." \
                --base "$TARGET" \
                --head "$PROMO_BRANCH"
          fi
